<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="lock" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <g transform="translate(64,64)" filter="url(#glow)">
    <!-- Lock body -->
    <rect x="-24" y="-4" width="48" height="34" rx="6" fill="none" stroke="url(#lock)" stroke-width="4"/>
    <!-- Lock shackle -->
    <path d="M-16,-4 L-16,-16 A16,16 0 0 1 16,-16 L16,-4" fill="none" stroke="url(#lock)" stroke-width="4" stroke-linecap="round"/>
    <!-- Keyhole -->
    <circle cx="0" cy="12" r="5" fill="url(#lock)"/>
    <rect x="-2" y="14" width="4" height="8" rx="1" fill="url(#lock)"/>
    <!-- Cloud accent -->
    <g transform="translate(16,-26)" opacity="0.7">
      <path d="M-8,0 A6,6 0 0 1 -2,-6 A8,8 0 0 1 10,-4 A5,5 0 0 1 10,4 L-6,4 A6,6 0 0 1 -8,0Z" fill="#60a5fa" opacity="0.5"/>
    </g>
  </g>
</svg>
